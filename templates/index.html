{% extends "base.html" %}

{% block title %}WeatherWatch – Check Weather & Rain Alerts{% endblock %}

{% block content %}
<section class="hero-section">
  <div class="container">
    <h1>WeatherWatch ☔️</h1>
    <p>Will it rain? Find out and get email alerts instantly!</p>
    <div class="mt-3">
      <span class="clock-badge">⏰ <span id="clock"></span></span>
    </div>
  </div>
</section>

<section class="py-4">
  <div class="container">

    <!-- ===== Row 1: Lat/Long + City Name side by side ===== -->
    <div class="row g-4 justify-content-center mb-4">

      <!-- Card 1: Latitude & Longitude -->
      <div class="col-lg-5 col-md-6">
        <div class="card weather-card h-100">
          <div class="card-header-bar blue"></div>
          <div class="card-body p-4">
            <h5 class="card-title text-center mb-3">
              <img src="/static/images/map.png" class="card-icon" alt="map">
              By Latitude &amp; Longitude
              <img src="/static/images/location.png" class="card-icon" alt="location">
            </h5>
            <form id="latlongForm" action="/submit" method="post">
              <input type="hidden" name="input_type" value="latlong">
              <div class="mb-3">
                <label for="latitude" class="form-label">Latitude</label>
                <input type="text" class="form-control" id="latitude" name="latitude"
                       placeholder="e.g. 51.5074" required>
              </div>
              <div class="mb-3">
                <label for="longitude" class="form-label">Longitude</label>
                <input type="text" class="form-control" id="longitude" name="longitude"
                       placeholder="e.g. -0.1278" required>
              </div>
              <div class="mb-3">
                <label for="recipient_email_latlong" class="form-label">Email for Alerts</label>
                <input type="email" class="form-control" id="recipient_email_latlong"
                       name="recipient_email_latlong" placeholder="your@email.com" required>
              </div>
              <div class="text-center">
                <button type="submit" class="btn btn-weather-primary px-4 py-2">
                  🔍 Check Weather
                </button>
              </div>
            </form>
          </div>
        </div>
      </div>

      <!-- Card 2: City Name -->
      <div class="col-lg-5 col-md-6">
        <div class="card weather-card h-100">
          <div class="card-header-bar orange"></div>
          <div class="card-body p-4">
            <h5 class="card-title text-center mb-3">
              <img src="/static/images/cityscape.png" class="card-icon" alt="cityscape">
              By City Name
              <img src="/static/images/architecture-and-city.png" class="card-icon" alt="city">
            </h5>
            <form id="cityForm" action="/submit" method="post">
              <input type="hidden" name="input_type" value="city">
              <div class="mb-3">
                <label for="city_name" class="form-label">City Name</label>
                <input type="text" class="form-control" id="city_name" name="city_name"
                       placeholder="e.g. London" required>
              </div>
              <div class="mb-3">
                <label for="recipient_email_city" class="form-label">Email for Alerts</label>
                <input type="email" class="form-control" id="recipient_email_city"
                       name="recipient_email_city" placeholder="your@email.com" required>
              </div>
              <div class="text-center mt-3">
                <button type="submit" class="btn btn-weather-warm px-4 py-2">
                  🏙️ Check Weather
                </button>
              </div>
            </form>
          </div>
        </div>
      </div>

    </div>

    <!-- ===== Row 2: Interactive Map centered ===== -->
    <div class="row justify-content-center">
      <div class="col-lg-7 col-md-9">
        <div class="card weather-card">
          <div class="card-header-bar teal"></div>
          <div class="card-body p-4">
            <h5 class="card-title text-center mb-3">🗺️ Interactive Map</h5>
            <div id="map"></div>

            <div class="row g-2 mt-2">
              <div class="col-md-3 col-4">
                <label for="map_lat" class="form-label small">Latitude</label>
                <input type="text" class="form-control form-control-sm" id="map_lat" readonly>
              </div>
              <div class="col-md-3 col-4">
                <label for="map_lng" class="form-label small">Longitude</label>
                <input type="text" class="form-control form-control-sm" id="map_lng" readonly>
              </div>
              <div class="col-md-6 col-4">
                <label for="map_email" class="form-label small">Email for Alerts</label>
                <input type="email" class="form-control form-control-sm" id="map_email"
                       placeholder="your@email.com">
              </div>
            </div>

            <!-- Hidden form for map submission -->
            <form id="map_form" action="/submit" method="post" class="d-none">
              <input type="hidden" name="input_type" value="latlong">
              <input type="hidden" id="hidden_lat" name="latitude">
              <input type="hidden" id="hidden_lng" name="longitude">
              <input type="hidden" id="hidden_email" name="recipient_email_latlong">
            </form>

            <div class="text-center mt-3">
              <button type="button" id="check_map_weather" class="btn btn-weather-teal px-4 py-2">
                📍 Check Selected Location
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>

  </div>
</section>
{% endblock %}
